<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SilverLake ShowCase</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>SilverLake Showcase</h1>

  <nav>
  <a href="index.html">Home</a>
  <a href="shop.html">Shop</a>
  <a href="about.html">About</a>

  <!-- CART DROPDOWN -->
  <div class="cart-dropdown">
    <button onclick="toggleCart()" class="cart-btn">
      🛒 Cart (<span id="cart-count">0</span>)
    </button>

    <div id="cart-box" class="cart-box">
      <ul id="cart-items"></ul>
      <p id="cart-total">Total: $0.00</p>
      <button onclick="reserveOrder()">Reserve Pickup</button>
    </div>
  </div>
</nav>
</header>

<!-- 🔹 HERO -->
<section class="hero">
  <h2>Handpicked Deals. Updated Often.</h2>
  <p>Snacks, bundles, and more — all in one place.</p>
</section>

<!-- 🔹 SECTIONS -->
<section class="products" id="food"><h2>Food / Snacks</h2></section>
<section class="products" id="cleaning"><h2>Cleaning Supplies</h2></section>
<section class="products" id="health"><h2>Health & Beauty</h2></section>
<section class="products" id="beverages"><h2>Beverages</h2></section>
<section class="products" id="tools"><h2>Tools</h2></section>
<section class="products" id="appliances"><h2>Appliances</h2></section>

<script>
let cart = [];

/* LOAD PRODUCTS FROM ADMIN STORAGE */
function loadAllProducts() {
  const data = JSON.parse(localStorage.getItem("products")) || {
    food: [],
    cleaning: [],
    health: [],
    beverages: [],
    tools: [],
    appliances: []
  };

  for (let category in data) {
    const section = document.getElementById(category);

    data[category].forEach(item => {
      const div = document.createElement("div");
      div.className = "product-card";

      div.innerHTML = `
        <img src="${item.image}">
        <h3>${item.name}</h3>
        <p>$${item.price}</p>
        <button onclick="addToCart('${item.name}', ${item.price})">
          Add to Cart
        </button>
      `;

      section.appendChild(div);
    });
  }
}

/* CART */
function addToCart(name, price) {
  cart.push({ name, price: parseFloat(price) });
  updateCart();
}

/* UPDATE CART UI */
function updateCart() {
  const cartList = document.getElementById("cart-items");
  const totalEl = document.getElementById("cart-total");
  const countEl = document.getElementById("cart-count");

  cartList.innerHTML = "";

  let total = 0;

  cart.forEach(item => {
    const li = document.createElement("li");
    li.textContent = `${item.name} - $${item.price}`;
    cartList.appendChild(li);

    total += item.price;
  });

  totalEl.textContent = "Total: $" + total.toFixed(2);
  countEl.textContent = cart.length;
}

/* DROPDOWN TOGGLE */
function toggleCart() {
  const box = document.getElementById("cart-box");
  box.style.display = box.style.display === "block" ? "none" : "block";
}

/* RESERVATION */
function reserveOrder() {
  if (cart.length === 0) {
    alert("Your cart is empty!");
    return;
  }

  let orderText = "Reservation Request:\n\n";

  cart.forEach(item => {
    orderText += `${item.name} - $${item.price}\n`;
  });

  const total = cart.reduce((sum, item) => sum + item.price, 0);

  orderText += `\nTotal: $${total.toFixed(2)}`;

  const email = "your@email.com"; // CHANGE THIS
  const subject = "New Pickup Reservation";

  window.location.href =
    `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(orderText)}`;
}

/* INIT */
loadAllProducts();
</script>

</body>
</html>
