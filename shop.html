<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SilverLake ShowCase</title>
  <link rel="stylesheet" href="style.css">
</head>

  <header>
  <h1>SilverLake Showcase</h1>
  </div>

  <nav>
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="about.html">About</a>
  </nav>
</header>

<body>

  <!-- 🔹 HERO -->
  <section class="hero">
    <h2>Handpicked Deals. Updated Often.</h2>
    <p>Snacks, bundles, and more — all in one place.</p>
  </section>

  <!-- 🔹 FOOD / SNACKS -->
  <section class="products" id="food">
    <h2>Food / Snacks</h2>
  </section>

  <!-- 🔹 CLEANING -->
  <section class="products" id="cleaning">
    <h2>Cleaning Supplies</h2>
  </section>

  <!-- 🔹 HEALTH -->
  <section class="products" id="health">
    <h2>Health & Beauty</h2>
  </section>

  <!-- 🔹 BEVERAGES -->
  <section class="products" id="beverages">
    <h2>Beverages</h2>
  </section>

  <!-- 🔹 TOOLS -->
  <section class="products" id="tools">
    <h2>Tools</h2>
  </section>

  <!-- 🔹 APPLIANCES -->
  <section class="products" id="appliances">
    <h2>Appliances</h2>
  </section>
<script>
let cart = [];

// LOAD PRODUCTS
fetch("products.json")
  .then(res => res.json())
  .then(data => {
    loadProducts("food", data.food);
    loadProducts("cleaning", data.cleaning);
    loadProducts("health", data.health);
    loadProducts("beverages", data.beverages);
    loadProducts("tools", data.tools);
    loadProducts("appliances", data.appliances);
  });

// DISPLAY PRODUCTS
function loadProducts(sectionId, items) {
  const section = document.getElementById(sectionId);

  items.forEach(item => {
    const div = document.createElement("div");
    div.className = "product-card";

    div.innerHTML = `
      <img src="${item.image}">
      <h3>${item.name}</h3>
      <p>${item.price}</p>
      <button onclick="addToCart('${item.name}', '${item.price}')">
        Add to Cart
      </button>
    `;

    section.appendChild(div);
  });
}

// ADD TO CART
function addToCart(name, price) {
  cart.push({ name, price });
  updateCart();
}

// UPDATE CART DISPLAY
function updateCart() {
  const cartList = document.getElementById("cart-items");
  const totalEl = document.getElementById("cart-total");

  cartList.innerHTML = "";

  let total = 0;

  cart.forEach(item => {
    const li = document.createElement("li");
    li.textContent = `${item.name} - ${item.price}`;
    cartList.appendChild(li);

    total += parseFloat(item.price.replace("$", ""));
  });

  totalEl.textContent = "Total: $" + total.toFixed(2);
}
  function reserveOrder() {
  if (cart.length === 0) {
    alert("Your cart is empty!");
    return;
  }

  let orderText = "Reservation Request:\n\n";

  cart.forEach(item => {
    orderText += `${item.name} - ${item.price}\n`;
  });

  const total = cart.reduce((sum, item) => {
    return sum + parseFloat(item.price.replace("$", ""));
  }, 0);

  orderText += `\nTotal: $${total.toFixed(2)}`;

  const email = "your@email.com"; // CHANGE THIS
  const subject = "New Pickup Reservation";

  window.location.href =
    `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(orderText)}`;
}
</script>

</body
</html>
